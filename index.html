<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turnos</title>
    <!-- PWA Theme Color -->
    <meta name="theme-color" content="#1e293b">
    <!-- Manifest Link -->
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Mobile app styling to prevent text selection and zoom */
        body {
            font-family: 'Inter', sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .card {
            transition: transform 0.1s ease-in-out;
        }
        .card:active {
            transform: scale(0.98);
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col font-sans text-slate-300 sm:justify-center sm:items-center">

    <div class="bg-slate-900 w-full h-full sm:h-auto sm:max-w-md sm:rounded-2xl overflow-hidden flex flex-col min-h-screen sm:min-h-[auto] sm:border sm:border-slate-800">
        
        <!-- App Header (Professional Dark) -->
        <div class="bg-slate-950 pt-12 pb-6 px-6 text-slate-100 text-center border-b border-slate-800">
            <h1 class="text-2xl font-bold tracking-tight text-white mb-1">Rotación de Puestos</h1>
            <p class="text-slate-400 text-xs font-semibold tracking-widest uppercase">Impor & Expor</p>
        </div>

        <div class="p-6 flex-grow bg-slate-900 flex flex-col">
            
            <!-- Install Button -->
            <button id="install-btn" class="hidden w-full mb-8 bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold py-3 px-4 rounded-xl border border-slate-700 active:bg-slate-600 flex items-center justify-center gap-3 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Instalar App
            </button>

            <!-- Input Section -->
            <div class="mb-8">
                <label for="month-input" class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider pl-1">
                    Seleccionar Periodo
                </label>
                <input 
                    type="month" 
                    id="month-input" 
                    class="w-full px-5 py-4 rounded-xl border border-slate-800 focus:ring-1 focus:ring-slate-600 focus:border-slate-600 outline-none transition-all text-xl font-semibold text-slate-200 bg-slate-950 text-center appearance-none"
                    value="2026-03"
                >
            </div>

            <!-- Results Section -->
            <div class="space-y-4 flex-grow">
                
                <!-- EXPOR Card -->
                <div class="card bg-slate-800 border border-slate-700 rounded-xl p-5">
                    <div class="flex items-center mb-4">
                        <div class="bg-slate-700/50 p-2 rounded-lg mr-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-widest">Expor</h2>
                    </div>
                    <div id="expor-list" class="flex gap-2 text-slate-200">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- IMPOR Card -->
                <div class="card bg-slate-800 border border-slate-700 rounded-xl p-5">
                    <div class="flex items-center mb-4">
                        <div class="bg-slate-700/50 p-2 rounded-lg mr-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-widest">Impor</h2>
                    </div>
                    <div id="impor-list" class="flex gap-2 text-slate-200">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="bg-slate-950 border-t border-slate-800 p-4 text-center text-xs text-slate-500 font-medium tracking-wide">
            Base: Marzo 2026
        </div>
    </div>

    <script>
        /* --- 1. CORE LOGIC --- */
        const rotationStates = [
            { expor: ["Raquel", "Emy"], impor: ["Bego", "Esneli"] },
            { expor: ["Raquel", "Esneli"], impor: ["Bego", "Emy"] },
            { expor: ["Bego", "Esneli"], impor: ["Raquel", "Emy"] },
            { expor: ["Bego", "Emy"], impor: ["Raquel", "Esneli"] }
        ];

        const BASE_YEAR = 2026;
        const BASE_MONTH = 3;

        const monthInput = document.getElementById('month-input');
        const exporList = document.getElementById('expor-list');
        const imporList = document.getElementById('impor-list');

        function generatePills(names, accentColor) {
            return names.map(name => 
                `<span class="bg-slate-900 border border-slate-700 text-slate-300 font-medium px-4 py-3 rounded-lg w-1/2 text-center flex-grow 
                relative overflow-hidden group">
                    <span class="absolute inset-y-0 left-0 w-1 bg-${accentColor}-500/80 rounded-l"></span>
                    ${name}
                </span>`
            ).join('');
        }

        function calculatePositions() {
            const inputValue = monthInput.value;
            if (!inputValue) return;

            const [yearStr, monthStr] = inputValue.split('-');
            const targetYear = parseInt(yearStr, 10);
            const targetMonth = parseInt(monthStr, 10);

            const monthsDifference = (targetYear - BASE_YEAR) * 12 + (targetMonth - BASE_MONTH);
            const stateIndex = ((monthsDifference % 4) + 4) % 4;
            const currentState = rotationStates[stateIndex];

            exporList.innerHTML = generatePills(currentState.expor, 'orange');
            imporList.innerHTML = generatePills(currentState.impor, 'teal');
        }

        monthInput.addEventListener('input', calculatePositions);
        calculatePositions();

        /* --- 2. PROGRESSIVE WEB APP (PWA) MAGIC --- */
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(registration => {
                // Check for updates
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // A new version is ready!
                            if (confirm("¡Nueva versión de la app disponible! ¿Deseas actualizar ahora?")) {
                                newWorker.postMessage('skipWaiting');
                            }
                        }
                    });
                });
            }).catch(console.error);

            // Reload once the new worker takes over
            let refreshing;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }

        /* --- 3. PWA INSTALL BUTTON LOGIC --- */
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
