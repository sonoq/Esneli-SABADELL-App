<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turnos</title>
    <!-- PWA Theme Color -->
    <meta name="theme-color" content="#4f46e5">
    <!-- Manifest Link -->
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile app styling to prevent text selection and zoom */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .card {
            transition: transform 0.1s ease-in-out;
        }
        .card:active {
            transform: scale(0.98);
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans text-slate-800 sm:justify-center sm:items-center">

    <div class="bg-white shadow-xl w-full h-full sm:h-auto sm:max-w-md sm:rounded-2xl overflow-hidden flex flex-col min-h-screen sm:min-h-[auto]">
        
        <!-- App Header -->
        <div class="bg-indigo-600 pt-10 pb-6 px-6 text-white text-center shadow-md relative z-10">
            <h1 class="text-2xl font-bold tracking-wide">Rotación de Puestos</h1>
            <p class="text-indigo-200 text-sm mt-1 font-medium">IMPOR & EXPOR</p>
        </div>

        <div class="p-6 flex-grow bg-slate-50 flex flex-col">
            
            <!-- Install Button (Hidden by default, shown if PWA is installable) -->
            <button id="install-btn" class="hidden w-full mb-6 bg-indigo-100 text-indigo-700 font-bold py-3 px-4 rounded-xl border-2 border-indigo-200 active:bg-indigo-200 flex items-center justify-center gap-2">
                <span>⬇️</span> Instalar esta App en el teléfono
            </button>

            <!-- Input Section -->
            <div class="mb-6">
                <label for="month-input" class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
                    Seleccione Mes y Año
                </label>
                <input 
                    type="month" 
                    id="month-input" 
                    class="w-full px-4 py-4 rounded-xl border-2 border-slate-200 focus:ring-0 focus:border-indigo-500 outline-none transition-all text-xl font-bold text-slate-700 bg-white text-center shadow-sm"
                    value="2026-03"
                >
            </div>

            <!-- Results Section -->
            <div class="space-y-4 flex-grow">
                
                <!-- EXPOR Card -->
                <div class="card bg-orange-50 border-2 border-orange-100 rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center mb-3">
                        <div class="bg-orange-200 p-2 rounded-lg mr-3 shadow-sm">
                            <span class="text-xl block">📦</span>
                        </div>
                        <h2 class="text-xl font-black text-orange-800 tracking-tight">EXPOR</h2>
                    </div>
                    <div id="expor-list" class="flex gap-2 font-bold text-orange-900 mt-2">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- IMPOR Card -->
                <div class="card bg-teal-50 border-2 border-teal-100 rounded-2xl p-5 shadow-sm">
                    <div class="flex items-center mb-3">
                        <div class="bg-teal-200 p-2 rounded-lg mr-3 shadow-sm">
                            <span class="text-xl block">📥</span>
                        </div>
                        <h2 class="text-xl font-black text-teal-800 tracking-tight">IMPOR</h2>
                    </div>
                    <div id="impor-list" class="flex gap-2 font-bold text-teal-900 mt-2">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="bg-white border-t border-slate-200 p-4 text-center text-xs text-slate-400 font-medium">
            Base: Marzo 2026
        </div>
    </div>

    <script>
        /* --- 1. CORE LOGIC --- */
        const rotationStates = [
            { expor: ["Raquel", "Emy"], impor: ["Bego", "Esneli"] },
            { expor: ["Raquel", "Esneli"], impor: ["Bego", "Emy"] },
            { expor: ["Bego", "Esneli"], impor: ["Raquel", "Emy"] },
            { expor: ["Bego", "Emy"], impor: ["Raquel", "Esneli"] }
        ];

        const BASE_YEAR = 2026;
        const BASE_MONTH = 3;

        const monthInput = document.getElementById('month-input');
        const exporList = document.getElementById('expor-list');
        const imporList = document.getElementById('impor-list');

        function generatePills(names, colorStr) {
            return names.map(name => 
                `<span class="bg-white border border-${colorStr}-200 px-4 py-2 rounded-xl shadow-sm text-lg w-1/2 text-center flex-grow">${name}</span>`
            ).join('');
        }

        function calculatePositions() {
            const inputValue = monthInput.value;
            if (!inputValue) return;

            const [yearStr, monthStr] = inputValue.split('-');
            const targetYear = parseInt(yearStr, 10);
            const targetMonth = parseInt(monthStr, 10);

            const monthsDifference = (targetYear - BASE_YEAR) * 12 + (targetMonth - BASE_MONTH);
            const stateIndex = ((monthsDifference % 4) + 4) % 4;
            const currentState = rotationStates[stateIndex];

            exporList.innerHTML = generatePills(currentState.expor, 'orange');
            imporList.innerHTML = generatePills(currentState.impor, 'teal');
        }

        monthInput.addEventListener('input', calculatePositions);
        calculatePositions();

        /* --- 2. PROGRESSIVE WEB APP (PWA) MAGIC --- */
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(registration => {
                // Check for updates
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // A new version is ready!
                            if (confirm("¡Nueva versión de la app disponible! ¿Deseas actualizar ahora?")) {
                                newWorker.postMessage('skipWaiting');
                            }
                        }
                    });
                });
            }).catch(console.error);

            // Reload once the new worker takes over
            let refreshing;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }

        /* --- 3. PWA INSTALL BUTTON LOGIC --- */
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
